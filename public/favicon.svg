<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Rounded ink-color background tile so the pen pops in browser tabs -->
  <rect width="32" height="32" rx="7" fill="#1c2230"/>
  <!-- Pen body: diagonal from top-right (cap end) to bottom-left (nib).
       Two parallel strokes form the barrel; a small triangle is the nib. -->
  <g transform="rotate(-45 16 16)" fill="#faf9f5">
    <!-- barrel -->
    <rect x="13.4" y="6"  width="5.2" height="14" rx="1"/>
    <!-- ferrule (silver band where nib meets barrel) -->
    <rect x="13.4" y="20" width="5.2" height="1.6" fill="#c9b779"/>
    <!-- nib triangle -->
    <polygon points="13.4,21.6 18.6,21.6 16,26.4"/>
    <!-- nib slit -->
    <rect x="15.7" y="21.8" width="0.6" height="3.6" fill="#1c2230"/>
    <!-- cap clip on the top -->
    <rect x="14.6" y="3.4" width="0.9" height="3.6" rx="0.4"/>
  </g>
</svg>
