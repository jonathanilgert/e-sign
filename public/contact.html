<!DOCTYPE html>
<html lang="en">
<head>

        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Penned</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='14' fill='%23121517'/><text x='32' y='44' text-anchor='middle' font-family='Inter,sans-serif' font-size='38' font-weight='700' fill='%23fafaf7' letter-spacing='-2'>A</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    :root {
      --bg: oklch(99% 0.003 90);
      --paper: #ffffff;
      --ink: oklch(20% 0.01 250);
      --ink-2: oklch(35% 0.01 250);
      --ink-3: oklch(52% 0.012 250);
      --ink-4: oklch(72% 0.008 250);
      --line: oklch(92% 0.006 250);
      --line-2: oklch(95% 0.004 250);
      --accent: oklch(48% 0.09 200);
      --accent-tint: oklch(95% 0.02 200);
      --accent-deep: oklch(28% 0.06 200);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
      font-size: 16px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Nav */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px max(20px, calc(50% - 580px));
      border-bottom: 1px solid var(--line-2);
      background: color-mix(in oklch, var(--bg) 88%, transparent);
      backdrop-filter: blur(12px);
    }
    .brand {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      font-weight: 600;
      font-size: 16px;
      text-decoration: none;
      color: var(--ink);
    }
    .brand-mark {
      display: inline-grid;
      place-items: center;
      width: 26px;
      height: 26px;
      border-radius: 7px;
      background: var(--ink);
      color: var(--bg);
      font-weight: 700;
      font-size: 14px;
      letter-spacing: -0.04em;
    }
    .nav-back {
      font-size: 14px;
      color: var(--ink-3);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: color 0.15s;
    }
    .nav-back:hover { color: var(--ink); }

    /* Main */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
    }

    .contact-wrap {
      width: 100%;
      max-width: 520px;
    }

    .contact-heading {
      margin: 0 0 8px;
      font-size: clamp(26px, 4vw, 36px);
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1.1;
    }
    .contact-sub {
      margin: 0 0 36px;
      color: var(--ink-3);
      font-size: 15px;
    }

    .contact-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 36px;
      box-shadow: 0 1px 2px rgba(20,30,40,0.04), 0 20px 50px -20px rgba(20,30,40,0.12);
    }

    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink-2);
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      background: var(--paper);
      color: var(--ink);
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-tint);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 130px;
      line-height: 1.6;
    }
    ::placeholder { color: var(--ink-4); }

    .btn-submit {
      width: 100%;
      padding: 13px 20px;
      background: var(--ink);
      color: var(--bg);
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.12s;
      margin-top: 4px;
    }
    .btn-submit:hover { background: var(--accent-deep); transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    /* States */
    .form-msg {
      display: none;
      margin-top: 16px;
      padding: 13px 16px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
    }
    .form-msg.success {
      display: block;
      background: var(--accent-tint);
      color: var(--accent-deep);
      border: 1px solid color-mix(in oklch, var(--accent) 25%, transparent);
    }
    .form-msg.error {
      display: block;
      background: oklch(96% 0.02 20);
      color: oklch(35% 0.12 20);
      border: 1px solid oklch(88% 0.05 20);
    }

    /* Footer */
    footer {
      padding: 24px max(20px, calc(50% - 580px));
      border-top: 1px solid var(--line-2);
      font-size: 13px;
      color: var(--ink-4);
      text-align: center;
    }
    footer .legal-links {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-bottom: 8px;
    }
    footer .legal-links a {
      color: var(--ink-3);
      text-decoration: none;
    }
    footer .legal-links a:hover { color: var(--ink); }

    @media (max-width: 540px) {
      .contact-card { padding: 24px 20px; }
      main { padding: 40px 16px; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="brand">
      <span class="brand-mark">P</span>
      <span>Penned</span>
    </a>
    <a href="/" class="nav-back">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M8.5 3L5 7l3.5 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Back to home
    </a>
  </nav>

  <main>
    <div class="contact-wrap">
      <h1 class="contact-heading">Get in touch</h1>
      <p class="contact-sub">We usually respond within one business day.</p>

      <div class="contact-card">
        <form id="contact-form" novalidate>
          <div class="form-group">
            <label for="c-name">Your name</label>
            <input type="text" id="c-name" name="name" placeholder="Jane Smith" autocomplete="name" required>
          </div>
          <div class="form-group">
            <label for="c-phone">Phone number</label>
            <input type="tel" id="c-phone" name="phone" placeholder="+1 (555) 000-0000" autocomplete="tel">
          </div>
          <div class="form-group">
            <label for="c-email">Email <span style="color:var(--ink-4);font-weight:400">(optional)</span></label>
            <input type="email" id="c-email" name="email" placeholder="you@example.com" autocomplete="email">
          </div>
          <div class="form-group">
            <label for="c-message">Message</label>
            <textarea id="c-message" name="message" placeholder="Tell us how we can help…" required></textarea>
          </div>
          <button type="submit" class="btn-submit" id="btn-submit">Send message</button>
          <div class="form-msg" id="form-msg"></div>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <div class="legal-links">
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Service</a>
      <a href="/cookies">Cookie Policy</a>
      <a href="/disclaimer">Disclaimer</a>
    </div>
    &copy; <span id="footer-year"></span> Penned. All rights reserved.
  </footer>

  <script>
    document.getElementById('footer-year').textContent = new Date().getFullYear();

    const form = document.getElementById('contact-form');
    const msg  = document.getElementById('form-msg');
    const btn  = document.getElementById('btn-submit');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      msg.className = 'form-msg';
      msg.textContent = '';

      const name    = document.getElementById('c-name').value.trim();
      const phone   = document.getElementById('c-phone').value.trim();
      const email   = document.getElementById('c-email').value.trim();
      const message = document.getElementById('c-message').value.trim();

      if (!name) { showMsg('error', 'Please enter your name.'); return; }
      if (!message) { showMsg('error', 'Please enter a message.'); return; }

      btn.disabled = true;
      btn.textContent = 'Sending…';

      try {
        const res = await fetch('/api/contact', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone, email, message })
        });
        const data = await res.json();
        if (res.ok) {
          form.reset();
          showMsg('success', "Thanks! We'll be in touch soon.");
        } else {
          showMsg('error', data.error || 'Something went wrong. Please try again.');
        }
      } catch {
        showMsg('error', 'Network error — please try again.');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Send message';
      }
    });

    function showMsg(type, text) {
      msg.className = 'form-msg ' + type;
      msg.textContent = text;
    }
  </script>
</body>
</html>
